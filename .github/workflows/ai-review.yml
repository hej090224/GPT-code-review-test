name: AI Code Review

on:
  pull_request:
    types:
      - opened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    uses: hej090224/ai-review-workflows/.github/workflows/code-review.yml@master
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    with:
      project_type: backend
      model: gpt-5.4-mini
      effort: medium